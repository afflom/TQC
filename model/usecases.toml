# Use-case instances of the parametric framework. The implementation is generic over
# `UseCaseParams { scope, modality, context }`; these are the instances it is run at.
#
# `atlas` is the canonical UOR Atlas, validated against the F1 oracle. `demo-small` is an
# arbitrary second instance whose presence proves the framework is genuinely parametric
# (no Atlas literal leaks into the generic code).

[[usecase]]
id = "atlas"
canonical = true
scope = 4          # q = 2^(O-2T) = 2^(8-6) = 4
modality = 3       # T
context = 8        # O
oracle = "f1-atlas"
note = "The UOR Atlas: 96 classes, stride 24, carrier dim 24."

[[usecase]]
id = "demo-small"
canonical = false
scope = 2
modality = 2
context = 4
oracle = ""
note = "Arbitrary use-case (8 classes, stride 8, carrier dim 8). Proves parametricity."
