# cargo-deny configuration. Installed and run in CI (`cargo deny check`).
[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
# Covers the dependency set: holospaces (MIT), hologram (MIT OR Apache-2.0),
# uor-addr (Apache-2.0), F1 (MIT, build-time oracle only), and common crates.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/Hologram-Technologies/holospaces",
    "https://github.com/Hologram-Technologies/hologram",
]
